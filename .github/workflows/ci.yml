name: CI build

# Cross-platform safety net: builds the mu-family plugins (VST3/CLAP/Standalone) + the unit
# tests on Linux, macOS, and Windows, and runs the test suites + the mu-core boundary check.
# Catches portability regressions early. No signing / installers / tester deploy here — those
# stay on the local Windows release flow. mu-link (Win32 shared-memory bus) builds on Windows
# only until the POSIX backend lands; off-Windows the standalone bridge is a no-op stub.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      JUCE_PATH: ${{ github.workspace }}/JUCE

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # ThirdParty/{clap-juce-extensions,signalsmith-*} are submodules

      - name: Checkout JUCE 8.0.12
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev \
            libx11-dev libxext-dev libxinerama-dev libxrandr-dev libxcursor-dev \
            libxcomposite-dev libxrender-dev \
            libfreetype6-dev libfontconfig1-dev libgl1-mesa-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DMUFAMILY_DEPLOY_TESTERS=OFF

      - name: Build plugins + Standalone + tests
        run: >
          cmake --build build --config Debug --target
          mu-clid_VST3 mu-clid_CLAP mu-clid_Standalone
          mu-tant_VST3 mu-tant_CLAP mu-tant_Standalone
          mu-clid-tests mu-tant-tests

      - name: Build mu-link (Windows only)
        if: runner.os == 'Windows'
        run: cmake --build build --config Debug --target mu-link mu-link-server mu-link-tone mu-link-harness mu-link-tests

      # AU (Audio Unit v2) is macOS-only — the wrapper needs Apple's AudioUnit SDK, so the
      # _AU targets exist only in an Apple configure. Building them here is the real proof
      # AU compiles for every product (we have no local Mac). Hard pass/fail.
      - name: Build AU (macOS only)
        if: runner.os == 'macOS'
        run: >
          cmake --build build --config Debug --target
          mu-clid_AU mu-clid-lite_AU mu-tant_AU mu-toni_AU

      # Validate each component with Apple's auval. Install the freshly-built bundles into
      # the user Components folder and force a re-scan first. Best-effort (continue-on-error)
      # until proven stable on the headless runner — the build step above is the hard gate.
      - name: Validate AU with auval (macOS only)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          comp_dir="$HOME/Library/Audio/Plug-Ins/Components"
          mkdir -p "$comp_dir"
          cp -R "build/mu-clid/mu-clid_artefacts/Debug/AU/mu-Clid.component"        "$comp_dir/"
          cp -R "build/mu-clid/mu-clid-lite_artefacts/Debug/AU/mu-Clid Lite.component" "$comp_dir/"
          cp -R "build/mu-tant/mu-tant_artefacts/Debug/AU/mu-Tant.component"        "$comp_dir/"
          cp -R "build/mu-toni/mu-toni_artefacts/Debug/AU/mu-Toni.component"        "$comp_dir/"
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          auval -a
          auval -v aumu MCld TDP1   # mu-Clid (instrument)
          auval -v aumi MCLt TDP1   # mu-Clid Lite (MIDI effect)
          auval -v aumu MTnt TDP1   # mu-Tant (instrument)
          auval -v aumu MTni TDP1   # mu-Toni (instrument)

      # Make the Mac builds downloadable from the run (no Mac needed to obtain them).
      - name: Upload AU components (macOS only)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: mu-family-AU-components
          path: build/**/Debug/AU/*.component
          if-no-files-found: error

      - name: Run mu-Clid tests
        shell: bash
        run: |
          exe="build/mu-clid/mu-clid-tests_artefacts/Debug/mu-clid-tests"
          [ -f "$exe.exe" ] && exe="$exe.exe"
          "$exe"

      - name: Run mu-Tant tests
        shell: bash
        run: |
          exe="build/mu-tant/mu-tant-tests_artefacts/Debug/mu-tant-tests"
          [ -f "$exe.exe" ] && exe="$exe.exe"
          "$exe"

      - name: Run mu-link tests (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          exe="build/mu-link/mu-link-tests_artefacts/Debug/mu-link-tests"
          [ -f "$exe.exe" ] && exe="$exe.exe"
          "$exe"

      - name: mu-core boundary check
        run: python tests/scripts/check-core-boundary.py
