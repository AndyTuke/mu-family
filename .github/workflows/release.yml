name: Release artifacts

# Manual release build: builds the mu-family plugins in RELEASE on Linux, macOS, and Windows
# and uploads the binaries (VST3 / CLAP / Standalone) as downloadable artifacts. CI runners
# can't write to the local OneDrive share, so the Mac/Linux artifacts are downloaded on the
# Windows machine and copied into TDP/Mac + TDP/Linux. (Windows Release is built + deployed
# locally with the installer.) Version comes from the committed build_number.txt at the run's
# commit, so pin/commit it before dispatching for a coordinated cross-platform version.

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      JUCE_PATH: ${{ github.workspace }}/JUCE

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout JUCE 8.0.12
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev \
            libx11-dev libxext-dev libxinerama-dev libxrandr-dev libxcursor-dev \
            libxcomposite-dev libxrender-dev \
            libfreetype6-dev libfontconfig1-dev libgl1-mesa-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DMUFAMILY_DEPLOY_TESTERS=OFF

      - name: Build Release plugins
        run: >
          cmake --build build --config Release --target
          mu-clid_VST3 mu-clid_CLAP mu-clid_Standalone
          mu-clid-lite_VST3 mu-clid-lite_CLAP
          mu-tant_VST3 mu-tant_CLAP mu-tant_Standalone
          mu-on_VST3 mu-on_CLAP mu-on_Standalone
          mu-toni_VST3 mu-toni_CLAP mu-toni_Standalone

      # AU is macOS-only: the _AU targets only exist in an APPLE configure (family rule —
      # MUFAMILY_AU_FORMAT appended to each FORMATS). Build them on the Mac runner only.
      - name: Build AU (macOS only)
        if: runner.os == 'macOS'
        run: >
          cmake --build build --config Release --target
          mu-clid_AU mu-clid-lite_AU mu-tant_AU mu-on_AU mu-toni_AU

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mu-family-${{ matrix.os }}-Release
          if-no-files-found: warn
          path: |
            build/mu-clid/mu-clid_artefacts/Release/VST3
            build/mu-clid/mu-clid_artefacts/Release/CLAP
            build/mu-clid/mu-clid_artefacts/Release/Standalone
            build/mu-clid/mu-clid-lite_artefacts/Release/VST3
            build/mu-clid/mu-clid-lite_artefacts/Release/CLAP
            build/mu-tant/mu-tant_artefacts/Release/VST3
            build/mu-tant/mu-tant_artefacts/Release/CLAP
            build/mu-tant/mu-tant_artefacts/Release/Standalone
            build/mu-on/mu-on_artefacts/Release/VST3
            build/mu-on/mu-on_artefacts/Release/CLAP
            build/mu-on/mu-on_artefacts/Release/Standalone
            build/mu-toni/mu-toni_artefacts/Release/VST3
            build/mu-toni/mu-toni_artefacts/Release/CLAP
            build/mu-toni/mu-toni_artefacts/Release/Standalone
            build/mu-clid/mu-clid_artefacts/Release/AU
            build/mu-clid/mu-clid-lite_artefacts/Release/AU
            build/mu-tant/mu-tant_artefacts/Release/AU
            build/mu-on/mu-on_artefacts/Release/AU
            build/mu-toni/mu-toni_artefacts/Release/AU

      # Package demo zips and publish a GitHub Release. Only runs on the Windows
      # runner — Mac/Linux builds are for tester downloads via the artifact above.
      - name: Read build number
        if: runner.os == 'Windows'
        id: version
        shell: pwsh
        run: |
          $build = (Get-Content build_number.txt).Trim()
          "build=$build"  >> $env:GITHUB_OUTPUT
          "tag=v1.0.$build" >> $env:GITHUB_OUTPUT

      - name: Stage and zip demo builds
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $base = "build"

          # mu-Clid (VST3 + CLAP + Standalone)
          New-Item -ItemType Directory -Path staging\mu-Clid -Force | Out-Null
          Copy-Item "$base\mu-clid\mu-clid_artefacts\Release\VST3\mu-Clid.vst3" `
                    staging\mu-Clid\ -Recurse
          Copy-Item "$base\mu-clid\mu-clid_artefacts\Release\CLAP\mu-Clid.clap" `
                    staging\mu-Clid\
          Copy-Item "$base\mu-clid\mu-clid_artefacts\Release\Standalone\mu-Clid.exe" `
                    staging\mu-Clid\
          Compress-Archive -Path staging\mu-Clid\* -DestinationPath mu-Clid-Windows.zip

          # mu-Clid Lite (VST3 + CLAP, no Standalone)
          New-Item -ItemType Directory -Path "staging\mu-Clid Lite" -Force | Out-Null
          Copy-Item "$base\mu-clid\mu-clid-lite_artefacts\Release\VST3\mu-Clid Lite.vst3" `
                    "staging\mu-Clid Lite\" -Recurse
          Copy-Item "$base\mu-clid\mu-clid-lite_artefacts\Release\CLAP\mu-Clid Lite.clap" `
                    "staging\mu-Clid Lite\"
          Compress-Archive -Path "staging\mu-Clid Lite\*" -DestinationPath mu-Clid-Lite-Windows.zip

          # mu-Tant (VST3 + CLAP + Standalone)
          New-Item -ItemType Directory -Path staging\mu-Tant -Force | Out-Null
          Copy-Item "$base\mu-tant\mu-tant_artefacts\Release\VST3\mu-Tant.vst3" `
                    staging\mu-Tant\ -Recurse
          Copy-Item "$base\mu-tant\mu-tant_artefacts\Release\CLAP\mu-Tant.clap" `
                    staging\mu-Tant\
          Copy-Item "$base\mu-tant\mu-tant_artefacts\Release\Standalone\mu-Tant.exe" `
                    staging\mu-Tant\
          Compress-Archive -Path staging\mu-Tant\* -DestinationPath mu-Tant-Windows.zip

      - name: Publish GitHub Release
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create ${{ steps.version.outputs.tag }} `
            --title "mu-family ${{ steps.version.outputs.tag }}" `
            --notes "Windows demo release ${{ steps.version.outputs.tag }}" `
            mu-Clid-Windows.zip `
            mu-Clid-Lite-Windows.zip `
            mu-Tant-Windows.zip
