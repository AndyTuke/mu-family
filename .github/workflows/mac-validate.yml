name: macOS validate (on-demand)

# Manual, cost-controlled macOS validation. macOS GitHub runners bill at 10x the
# minute rate, so this is NOT on the every-push matrix (that's ci.yml, Linux+Windows).
# Dispatch this when you're about to cut a release: it builds the universal Mac binaries,
# proves they're arm64+x86_64, validates them headlessly (pluginval + auval), renders the
# mu-Clid A-suite to WAVs, and uploads an evidence pack you download and inspect BEFORE
# sending anything to testers. It does NOT sign/notarize (that's #99) — testers still need
# the `xattr -dr com.apple.quarantine` strip until then.

on:
  workflow_dispatch:
    inputs:
      strictness:
        description: 'pluginval strictness level (1-10)'
        required: false
        default: '5'

jobs:
  validate:
    name: macOS build + validate
    runs-on: macos-latest
    env:
      JUCE_PATH: ${{ github.workspace }}/JUCE

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout JUCE 8.0.12
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install analysis deps
        run: pip install numpy

      - name: Configure (Release, universal)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DMUFAMILY_DEPLOY_TESTERS=OFF

      - name: Build plugins + Standalone + AU (Release)
        run: >
          cmake --build build --config Release --target
          mu-clid_VST3 mu-clid_CLAP mu-clid_Standalone mu-clid_AU
          mu-clid-lite_VST3 mu-clid-lite_CLAP mu-clid-lite_AU
          mu-tant_VST3 mu-tant_CLAP mu-tant_Standalone mu-tant_AU
          mu-on_VST3 mu-on_CLAP mu-on_Standalone mu-on_AU
          mu-toni_VST3 mu-toni_CLAP mu-toni_Standalone mu-toni_AU

      - name: Prepare report dir
        run: mkdir -p report

      # ── Universal proof (hard gate) ─────────────────────────────────────────
      # An Intel tester needs the x86_64 slice to load the plugins at all; fail unless
      # every checked Mach-O carries both arm64 and x86_64.
      - name: Verify universal binary (arm64 + x86_64)
        run: |
          set -e
          check() {
            local bin="$1"
            local archs; archs="$(lipo -archs "$bin")"
            echo "  $bin -> $archs" | tee -a report/lipo.txt
            echo "$archs" | grep -qw arm64  || { echo "::error::missing arm64 slice in $bin";  exit 1; }
            echo "$archs" | grep -qw x86_64 || { echo "::error::missing x86_64 slice in $bin"; exit 1; }
          }
          for p in mu-clid/mu-clid_artefacts mu-tant/mu-tant_artefacts mu-on/mu-on_artefacts mu-toni/mu-toni_artefacts; do
            name="$(basename "$(ls -d build/$p/Release/VST3/*.vst3)" .vst3)"
            check "build/$p/Release/VST3/$name.vst3/Contents/MacOS/$name"
          done
          check "build/mu-clid/mu-clid_artefacts/Release/Standalone/mu-Clid.app/Contents/MacOS/mu-Clid"
          check "build/mu-clid/mu-clid_artefacts/Release/AU/mu-Clid.component/Contents/MacOS/mu-Clid"
          echo "Universal (arm64 + x86_64) verified." | tee -a report/lipo.txt

      # ── pluginval the VST3s (hard gate) ─────────────────────────────────────
      # Headless host harness: instantiate, audio at many SR/block sizes, state save/restore,
      # parameter fuzz. The strongest automated "does it actually work on Mac" signal.
      - name: pluginval (VST3)
        run: |
          set -e
          curl -sL -o pluginval.zip \
            https://github.com/Tracktion/pluginval/releases/download/v1.0.3/pluginval_macOS.zip
          unzip -q pluginval.zip
          PV="pluginval.app/Contents/MacOS/pluginval"
          strict="${{ github.event.inputs.strictness }}"
          fail=0
          for vst3 in build/*/*_artefacts/Release/VST3/*.vst3; do
            echo "=== $vst3 ===" | tee -a report/pluginval.txt
            if "$PV" --strictness-level "$strict" --validate-in-process --skip-gui-tests "$vst3" 2>&1 | tee -a report/pluginval.txt; then
              echo "  -> passed" | tee -a report/pluginval.txt
            else
              echo "::error::pluginval failed for $vst3"; echo "  -> FAILED" | tee -a report/pluginval.txt; fail=1
            fi
          done
          exit $fail

      # ── auval the AUs (report-only) ─────────────────────────────────────────
      # Apple's own AU validator. Best-effort (continue-on-error) like ci.yml — the build +
      # pluginval above are the hard gates; auval can be flaky on a headless runner.
      - name: auval (AU)
        continue-on-error: true
        run: |
          comp="$HOME/Library/Audio/Plug-Ins/Components"; mkdir -p "$comp"
          cp -R build/mu-clid/mu-clid_artefacts/Release/AU/*.component "$comp/" || true
          cp -R build/mu-clid/mu-clid-lite_artefacts/Release/AU/*.component "$comp/" || true
          cp -R build/mu-tant/mu-tant_artefacts/Release/AU/*.component "$comp/" || true
          cp -R build/mu-on/mu-on_artefacts/Release/AU/*.component "$comp/" || true
          cp -R build/mu-toni/mu-toni_artefacts/Release/AU/*.component "$comp/" || true
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          { auval -v aumu MCld TDP1
            auval -v aumi MCLt TDP1
            auval -v aumu MTnt TDP1
            auval -v aumu MuOn TDP1
            auval -v aumu MTni TDP1; } 2>&1 | tee report/auval.txt

      # ── Render mu-Tant drone + analyse (hard gate — guaranteed audio) ───────
      # mu-Tant is a wavetable synth, so a headless render with the gater bypassed
      # produces a continuous oscillator drone with NO preset and NO sample dependency —
      # a content-independent "the Mac build actually makes sound" check. analyse.py
      # asserts the drone sits above the noise floor (proven locally: ~-14 dBFS).
      - name: Render + analyse (mu-Tant drone)
        run: |
          set -e
          BIN="build/mu-tant/mu-tant_artefacts/Release/Standalone/mu-Tant.app/Contents/MacOS/mu-Tant"
          "$BIN" --render --out report/mutant_drone.wav --seconds 4 2>&1 | tee report/mutant_render.txt
          python tests/scripts/analyse.py report/mutant_drone.wav tests/expectations/mutant_drone.json --verbose | tee report/mutant_analyse.txt

      # ── Render mu-Clid A-suite to WAVs (report-only bonus) ──────────────────
      # Extra rendered audio to download/listen to. Best-effort: the suite's presets are
      # repo-local but some may expect samples not on CI, so a silent clip shouldn't fail
      # the pack — the mu-Tant drone above is the hard guaranteed-audio gate.
      - name: Render + analyse (mu-Clid A-suite)
        continue-on-error: true
        run: |
          python tests/scripts/run-listening-tests.py --config Release --filter A 2>&1 | tee report/listening.txt

      - name: Upload validation report (logs + rendered WAVs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mac-validation-report
          path: |
            report/**
            tests/_out/**
          if-no-files-found: warn

      - name: Upload Mac plugin bundles (universal, unsigned)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mac-plugins-release
          path: |
            build/*/*_artefacts/Release/AU/*.component
            build/*/*_artefacts/Release/VST3/*.vst3
            build/*/*_artefacts/Release/CLAP/*.clap
            build/*/*_artefacts/Release/Standalone/*.app
          if-no-files-found: error
